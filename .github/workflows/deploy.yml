name: Quality and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calcpro-production
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build production bundle
        run: npm run build

      - name: Store production bundle
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: calcpro-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Restore production bundle
        uses: actions/download-artifact@v4
        with:
          name: calcpro-dist
          path: dist

      - name: Configure restricted SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Publish atomically safe static files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/fundingpips-calc/"

      - name: Verify production
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            https://farmcalc.duckdns.org/ > /dev/null
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            https://farmcalc.duckdns.org/site.webmanifest > /dev/null
