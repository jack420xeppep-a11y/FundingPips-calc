name: Quality and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: calcpro-production
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate operations scripts
        run: npm run check:ops

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build production bundle
        run: npm run build

      - name: Assemble release
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p release/server release/intelligence-service/intelligence
          cp -R dist release/
          cp server/index.js server/quote-relay.js release/server/
          find intelligence -maxdepth 1 -type f -name '*.js' ! -name '*.test.js' \
            -exec cp {} release/intelligence-service/intelligence/ \;
          cp package.json release/intelligence-service/

      - name: Store production release
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: calcpro-release
          path: release
          if-no-files-found: error
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Restore production release
        uses: actions/download-artifact@v8
        with:
          name: calcpro-release
          path: release

      - name: Configure restricted SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Publish frontend, quote relay, and gold intelligence
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" calcpro-intelligence-preflight
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            release/dist/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/fundingpips-calc/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            release/server/ "$DEPLOY_USER@$DEPLOY_HOST:/opt/fundingpips-calc-relay/server/"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            release/intelligence-service/ \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/fundingpips-calc-intelligence/"
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" calcpro-relay-restart
          test "$(ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" calcpro-relay-status)" = "active"
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" calcpro-intelligence-restart
          test "$(ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" calcpro-intelligence-status)" = "active"

      - name: Verify production
        run: |
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            https://farmcalc.duckdns.org/ > /dev/null
          curl --fail --silent --show-error --retry 5 --retry-delay 2 \
            https://farmcalc.duckdns.org/site.webmanifest > /dev/null
          quote_ok=false
          for _attempt in 1 2 3 4 5; do
            health="$(curl --fail --silent --show-error https://farmcalc.duckdns.org/api/quote-health || true)"
            if printf '%s' "$health" | grep -Eq '"status":"(live|stale)"' && \
              printf '%s' "$health" | grep -q '"quoteCount":3'; then
              quote_ok=true
              break
            fi
            sleep 2
          done
          if [ "$quote_ok" != true ]; then
            printf '%s\n' "$health"
            exit 1
          fi
          intelligence_ok=false
          for _attempt in 1 2 3 4 5 6; do
            intelligence="$(curl --fail --silent --show-error \
              https://farmcalc.duckdns.org/api/intelligence/health || true)"
            if printf '%s' "$intelligence" | grep -Eq '"status":"(live|stale|warming)"' && \
              printf '%s' "$intelligence" | grep -q '"schemaVersion":2'; then
              intelligence_ok=true
              break
            fi
            sleep 3
          done
          if [ "$intelligence_ok" != true ]; then
            printf '%s\n' "$intelligence"
            exit 1
          fi
